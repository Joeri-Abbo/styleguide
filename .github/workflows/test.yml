name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-react:
    name: React Styleguide Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: react-styleguide/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react-styleguide

      - name: Run tests
        run: npm test
        working-directory: react-styleguide
        env:
          CI: true
